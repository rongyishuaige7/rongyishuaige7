<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Rongyi，Yi盘创始人</title>
  <desc id="desc">橙黑色品牌横幅。左侧是让 AI 上下文随身移动的主张，右侧展示在一台电脑开始工作、通过 Yi盘携带上下文、换一台电脑继续工作的便携价值。</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111722"/>
      <stop offset="0.58" stop-color="#0b1018"/>
      <stop offset="1" stop-color="#151013"/>
    </linearGradient>
    <linearGradient id="accentWash" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ff6b4a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff6b4a" stop-opacity="0"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 8 4 0 8Z" fill="#ff6b4a"/>
    </marker>
    <clipPath id="panelClip">
      <rect x="1" y="1" width="1198" height="358" rx="20"/>
    </clipPath>
  </defs>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
    .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    .route { stroke-dasharray: 5 8; stroke-linecap: round; }
    .packet, .activity { opacity: 0; }
    @media (prefers-reduced-motion: no-preference) {
      .packet-start { animation: packet-start 6.4s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      .packet-continue { animation: packet-continue 6.4s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      .activity-drive { animation: activity-drive 6.4s ease-in-out infinite; }
      .activity-computer { animation: activity-computer 6.4s ease-in-out infinite; }
    }
    @keyframes packet-start {
      0%, 2% { transform: translateX(0); opacity: 0; }
      4% { opacity: 1; }
      27% { transform: translateX(42px); opacity: 1; }
      30%, 100% { transform: translateX(42px); opacity: 0; }
    }
    @keyframes activity-drive {
      0%, 26%, 42%, 100% { opacity: 0; }
      30%, 38% { opacity: 1; }
    }
    @keyframes packet-continue {
      0%, 42% { transform: translateX(0); opacity: 0; }
      45% { opacity: 1; }
      69% { transform: translateX(38px); opacity: 1; }
      72%, 100% { transform: translateX(38px); opacity: 0; }
    }
    @keyframes activity-computer {
      0%, 68%, 84%, 100% { opacity: 0; }
      72%, 80% { opacity: 1; }
    }
  </style>

  <rect x="1" y="1" width="1198" height="358" rx="20" fill="url(#surface)" stroke="#303846"/>
  <g clip-path="url(#panelClip)">
    <circle cx="1125" cy="44" r="290" fill="url(#accentWash)"/>
    <path d="M760 0H1200V360H1040Z" fill="#ff6b4a" opacity="0.025"/>
  </g>

  <g transform="translate(54 44)">
    <rect width="46" height="46" rx="12" fill="#151b25" stroke="#ff6b4a" stroke-width="2"/>
    <text x="23" y="31" fill="#ff6b4a" font-size="24" font-weight="800" text-anchor="middle">R</text>
    <text x="64" y="18" fill="#f3f6fa" font-size="16" font-weight="700" letter-spacing="3">RONGYI</text>
    <text x="64" y="40" fill="#8f99a8" font-size="13" letter-spacing="1.6">FOUNDER OF YI盘</text>
  </g>

  <text x="54" y="165" fill="#f3f6fa" font-size="52" font-weight="760" letter-spacing="-1.5">MAKE AI CONTEXT</text>
  <text x="54" y="224" fill="#ff6b4a" font-size="54" font-weight="800" letter-spacing="-1.8">MOVE WITH YOU.</text>
  <text x="57" y="269" fill="#9da6b4" font-size="16">装在 U 盘里的随身 AI 工作台</text>
  <text x="57" y="300" class="mono" fill="#737e8e" font-size="13" letter-spacing="1.4">PORTABLE CONTEXT / WORK ANYWHERE</text>

  <g fill="none" stroke="#ff6b4a" stroke-width="1.7" opacity="0.74">
    <path class="route" d="M810 174H852" marker-end="url(#arrow)"/>
    <path class="route" d="M1006 174H1044" marker-end="url(#arrow)"/>
  </g>
  <g fill="#fff3f0" stroke="#ff6b4a" stroke-width="2">
    <circle class="packet packet-start" cx="810" cy="174" r="4.5"/>
    <circle class="packet packet-continue" cx="1006" cy="174" r="4.5"/>
  </g>

  <g class="computer-start">
    <rect x="688" y="112" width="122" height="124" rx="14" fill="#111722" stroke="#414b5b"/>
    <rect x="710" y="134" width="78" height="52" rx="6" fill="#151b25" stroke="#778291"/>
    <path d="M749 186V197M730 201H768" fill="none" stroke="#778291" stroke-width="2" stroke-linecap="round"/>
    <text x="749" y="219" class="mono" fill="#f3f6fa" font-size="12" text-anchor="middle">DESKTOP</text>
  </g>

  <g class="portable-drive">
    <rect x="852" y="102" width="154" height="144" rx="16" fill="#181820" stroke="#ff6b4a" stroke-width="2"/>
    <rect x="878" y="128" width="102" height="66" rx="12" fill="#0e141d" stroke="#ff6b4a" stroke-opacity="0.42"/>
    <rect x="893" y="142" width="14" height="38" rx="3" fill="#ff6b4a" opacity="0.72"/>
    <rect x="912" y="142" width="14" height="38" rx="3" fill="#ff6b4a" opacity="0.42"/>
    <rect x="931" y="142" width="14" height="38" rx="3" fill="#ff6b4a" opacity="0.24"/>
    <text x="971" y="169" fill="#f3f6fa" font-size="23" font-weight="800" text-anchor="end">Yi</text>
    <text x="976" y="169" fill="#ff6b4a" font-size="22" font-weight="800">盘</text>
    <text x="929" y="218" class="mono" fill="#ff6b4a" font-size="11" letter-spacing="0.8" text-anchor="middle">PORTABLE CONTEXT</text>
    <rect class="activity activity-drive" x="848" y="98" width="162" height="152" rx="20" fill="none" stroke="#ff6b4a" stroke-width="3"/>
  </g>

  <g class="computer-continue">
    <rect x="1044" y="112" width="136" height="124" rx="14" fill="#111722" stroke="#414b5b"/>
    <rect x="1073" y="134" width="78" height="52" rx="6" fill="#151b25" stroke="#778291"/>
    <path d="M1112 186V197M1093 201H1131" fill="none" stroke="#778291" stroke-width="2" stroke-linecap="round"/>
    <text x="1112" y="219" class="mono" fill="#f3f6fa" font-size="10.5" text-anchor="middle">ANOTHER COMPUTER</text>
    <rect class="activity activity-computer" x="1040" y="108" width="144" height="132" rx="18" fill="none" stroke="#ff6b4a" stroke-width="3"/>
  </g>

  <text x="934" y="286" fill="#c7ced8" font-size="14" text-anchor="middle">换一台电脑，带着上下文继续工作</text>
  <text x="934" y="312" class="mono" fill="#778291" font-size="11" letter-spacing="1.2" text-anchor="middle">DESKTOP → YI盘 → ANOTHER COMPUTER</text>
</svg>
