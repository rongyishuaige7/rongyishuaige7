<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Rongyi，Yi盘创始人</title>
  <desc id="desc">橙黑色品牌横幅。左侧是让 AI 上下文随身移动的主张，右侧是资料、Yi盘、云端模型和 Agent 工作之间的关系示意。</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111722"/>
      <stop offset="0.58" stop-color="#0b1018"/>
      <stop offset="1" stop-color="#151013"/>
    </linearGradient>
    <linearGradient id="accentWash" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ff6b4a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff6b4a" stop-opacity="0"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 8 4 0 8Z" fill="#ff6b4a"/>
    </marker>
    <clipPath id="panelClip">
      <rect x="1" y="1" width="1198" height="358" rx="20"/>
    </clipPath>
  </defs>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
    .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    .route { stroke-dasharray: 6 10; stroke-linecap: round; }
    @media (prefers-reduced-motion: no-preference) {
      .route { animation: route-flow 1.8s linear infinite; }
      .activity-ring { animation: ring-live 2.8s ease-in-out infinite; }
      .node-context { animation: node-live 4.8s ease-in-out infinite; }
      .node-agent { animation: node-live 4.8s ease-in-out 800ms infinite; }
      .node-model { animation: node-live 4.8s ease-in-out 1600ms infinite; }
    }
    @keyframes route-flow { to { stroke-dashoffset: -32; } }
    @keyframes ring-live { 0%, 100% { opacity: 0.06; } 50% { opacity: 0.15; } }
    @keyframes node-live { 0%, 100% { opacity: 0.78; } 45%, 70% { opacity: 1; } }
  </style>

  <rect x="1" y="1" width="1198" height="358" rx="20" fill="url(#surface)" stroke="#303846"/>
  <g clip-path="url(#panelClip)">
    <circle cx="1125" cy="44" r="290" fill="url(#accentWash)"/>
    <path d="M760 0H1200V360H1040Z" fill="#ff6b4a" opacity="0.025"/>
  </g>

  <g transform="translate(54 44)">
    <rect width="46" height="46" rx="12" fill="#151b25" stroke="#ff6b4a" stroke-width="2"/>
    <text x="23" y="31" fill="#ff6b4a" font-size="24" font-weight="800" text-anchor="middle">R</text>
    <text x="64" y="18" fill="#f3f6fa" font-size="16" font-weight="700" letter-spacing="3">RONGYI</text>
    <text x="64" y="40" fill="#8f99a8" font-size="13" letter-spacing="1.6">FOUNDER OF YI盘</text>
  </g>

  <text x="54" y="165" fill="#f3f6fa" font-size="52" font-weight="760" letter-spacing="-1.5">MAKE AI CONTEXT</text>
  <text x="54" y="224" fill="#ff6b4a" font-size="54" font-weight="800" letter-spacing="-1.8">MOVE WITH YOU.</text>
  <text x="57" y="269" fill="#9da6b4" font-size="16">装在 U 盘里的随身 AI 工作台</text>
  <text x="57" y="300" class="mono" fill="#737e8e" font-size="13" letter-spacing="1.4">PORTABLE CONTEXT / PRACTICAL AGENTS</text>

  <g fill="none" stroke="#ff6b4a" stroke-width="1.7" opacity="0.74">
    <path class="route" d="M770 121C823 121 848 145 892 167" marker-end="url(#arrow)"/>
    <path class="route" d="M989 167C1031 145 1060 121 1112 121" marker-end="url(#arrow)"/>
    <path class="route" d="M940 222V282" marker-end="url(#arrow)"/>
  </g>

  <g class="node node-context">
    <rect x="688" y="91" width="132" height="60" rx="14" fill="#111722" stroke="#414b5b"/>
    <text x="754" y="117" class="mono" fill="#f3f6fa" font-size="14" text-anchor="middle">CONTEXT</text>
    <text x="754" y="138" fill="#8893a3" font-size="13" text-anchor="middle">资料与任务</text>
  </g>

  <g class="core">
    <circle class="activity-ring" cx="940" cy="177" r="72" fill="#ff6b4a" opacity="0.08"/>
    <circle cx="940" cy="177" r="53" fill="#0e141e" stroke="#ff6b4a" stroke-width="2"/>
    <circle cx="940" cy="177" r="42" fill="#151b25" stroke="#ff6b4a" stroke-opacity="0.38"/>
    <text x="932" y="185" fill="#f3f6fa" font-size="28" font-weight="800" text-anchor="end">Yi</text>
    <text x="938" y="185" fill="#ff6b4a" font-size="27" font-weight="800">盘</text>
  </g>

  <g class="node node-agent">
    <rect x="1060" y="91" width="112" height="60" rx="14" fill="#111722" stroke="#414b5b"/>
    <text x="1116" y="117" class="mono" fill="#f3f6fa" font-size="13" text-anchor="middle">AGENT</text>
    <text x="1116" y="138" fill="#8893a3" font-size="13" text-anchor="middle">工作与产出</text>
  </g>

  <g class="node node-model">
    <rect x="865" y="282" width="150" height="48" rx="14" fill="#111722" stroke="#414b5b"/>
    <text x="940" y="311" class="mono" fill="#c7ced8" font-size="13" letter-spacing="0.8" text-anchor="middle">CLOUD MODELS</text>
  </g>
</svg>
