<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">Rongyi Founder Lab</title>
  <desc id="desc">Founder of Yi盘. Portable context, local-first systems, and products built for real work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0d1118"/><stop offset="1" stop-color="#07090d"/></linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#ff6b4a"/><stop offset="1" stop-color="#ff9a3d"/></linearGradient>
    <radialGradient id="halo"><stop stop-color="#ff6b4a" stop-opacity=".2"/><stop offset="1" stop-color="#ff6b4a" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#fff" stroke-opacity=".035"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="1" y="1" width="1198" height="438" rx="24" fill="url(#bg)" stroke="#fff" stroke-opacity=".12"/>
  <rect x="1" y="1" width="1198" height="438" rx="24" fill="url(#grid)"/>
  <circle cx="926" cy="224" r="260" fill="url(#halo)"/>
  <path d="M610 1V439" stroke="#fff" stroke-opacity=".075"/>
  <g transform="translate(48 42)">
    <rect width="42" height="42" rx="10" fill="none" stroke="#ff6b4a" stroke-opacity=".7"/>
    <text x="21" y="29" fill="#ff6b4a" font-family="Arial,sans-serif" font-size="22" font-weight="800" text-anchor="middle">R</text>
    <text x="58" y="17" fill="#f1f4f8" font-family="Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="3">RONGYI</text>
    <text x="58" y="37" fill="#626b79" font-family="Arial,sans-serif" font-size="9" letter-spacing="2">/ FOUNDER LAB</text>
  </g>
  <text x="48" y="155" fill="#9aa3b1" font-family="Arial,sans-serif" font-size="11" font-weight="600" letter-spacing="3">FOUNDER · BUILDER · HANGZHOU</text>
  <text x="48" y="222" fill="#f1f4f8" font-family="Arial,sans-serif" font-size="58" font-weight="700" letter-spacing="-3">MAKE AI CONTEXT</text>
  <text x="48" y="288" fill="url(#hot)" font-family="Arial,sans-serif" font-size="62" font-weight="750" letter-spacing="-3">MOVE WITH YOU.</text>
  <text x="50" y="332" fill="#9aa3b1" font-family="Arial,sans-serif" font-size="15">Founder of Yi盘 · Product builder · Real-world engineering</text>
  <g transform="translate(652 105)">
    <text x="0" y="-28" fill="#626b79" font-family="monospace" font-size="9" letter-spacing="2">PORTABLE CONTEXT ROUTER / ABSTRACT MAP</text>
    <g fill="#090c11" stroke="#fff" stroke-opacity=".12">
      <rect x="0" y="24" width="132" height="48" rx="9"/><rect x="0" y="88" width="132" height="48" rx="9"/><rect x="0" y="152" width="132" height="48" rx="9"/>
      <rect x="382" y="37" width="118" height="48" rx="9"/><rect x="382" y="101" width="118" height="48" rx="9"/><rect x="382" y="165" width="118" height="48" rx="9"/>
    </g>
    <g fill="#dce2ea" font-family="Arial,sans-serif" font-size="9" font-weight="700" letter-spacing="1">
      <text x="14" y="45">WORK</text><text x="14" y="109">KNOWLEDGE</text><text x="14" y="173">CONTEXT</text>
      <text x="408" y="59">AGENT 01</text><text x="408" y="123">AGENT 02</text><text x="408" y="187">AGENT 03</text>
    </g>
    <g fill="#626b79" font-family="Arial,sans-serif" font-size="7"><text x="14" y="61">TASKS / OUTPUTS</text><text x="14" y="125">LONG-TERM DATA</text><text x="14" y="189">PROJECT HISTORY</text></g>
    <g fill="#46d89c"><circle cx="397" cy="57" r="4"/><circle cx="397" cy="121" r="4"/><circle cx="397" cy="185" r="4"/></g>
    <path d="M132 112H186M314 112H382" stroke="url(#hot)" stroke-width="2"/>
    <g fill="#ff6b4a" filter="url(#glow)"><circle cx="164" cy="112" r="4"/><circle cx="348" cy="112" r="4"/></g>
