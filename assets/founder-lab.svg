  </g>
  <line x1="48" y1="390" x2="1152" y2="390" stroke="#fff" stroke-opacity=".1"/>
  <g fill="#626b79" font-family="monospace" font-size="8" letter-spacing="2"><text x="48" y="414">PORTABLE CONTEXT</text><text x="480" y="414">LOCAL-FIRST SYSTEMS</text><text x="954" y="414">REAL WORK</text></g>
