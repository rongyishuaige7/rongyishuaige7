<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Yi盘盘内连续性闭环</title>
  <desc id="desc">盘内资料与任务进入 Yi盘工作台，需要智能处理时与云端模型双向交互，产出与任务记录留在盘内，经记录与沉淀成为下一次继续工作的基础。云端模型不是长期存储节点。结构示意，不是产品截图。</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7f8fa"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 8 4 0 8Z" fill="#e45738"/>
    </marker>
  </defs>
  <style>
    text { font-family: Arial, "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
    .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    .route { stroke-dasharray: 6 10; stroke-linecap: round; stroke-linejoin: round; }
    .packet, .activity { opacity: 0; }
    @media (prefers-reduced-motion: no-preference) {
      .packet-context { animation: packet-context 8.4s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      .packet-model-out { animation: packet-model-out 8.4s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      .packet-model-back { animation: packet-model-back 8.4s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      .packet-output { animation: packet-output 8.4s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      .packet-continuity { animation: packet-continuity 8.4s linear infinite; }
      .activity-workspace-in { animation: workspace-in 8.4s ease-in-out infinite; }
      .activity-model { animation: model-active 8.4s ease-in-out infinite; }
      .activity-workspace-back { animation: workspace-back 8.4s ease-in-out infinite; }
      .activity-output { animation: output-active 8.4s ease-in-out infinite; }
      .activity-context-return { animation: context-return 8.4s ease-in-out infinite; }
    }
    @keyframes packet-context {
      0% { transform: translateX(0); opacity: 0; }
      2% { opacity: 1; }
      12% { transform: translateX(142px); opacity: 1; }
      14%, 100% { transform: translateX(142px); opacity: 0; }
    }
    @keyframes workspace-in {
      0%, 13%, 19%, 100% { opacity: 0; }
      14%, 18% { opacity: 1; }
    }
    @keyframes packet-model-out {
      0%, 19% { transform: translateX(0); opacity: 0; }
      20% { opacity: 1; }
      31% { transform: translateX(140px); opacity: 1; }
      32%, 100% { transform: translateX(140px); opacity: 0; }
    }
    @keyframes model-active {
      0%, 32%, 38%, 100% { opacity: 0; }
      33%, 37% { opacity: 1; }
    }
    @keyframes packet-model-back {
      0%, 38% { transform: translateX(0); opacity: 0; }
      39% { opacity: 1; }
      49% { transform: translateX(-140px); opacity: 1; }
      50%, 100% { transform: translateX(-140px); opacity: 0; }
    }
    @keyframes workspace-back {
      0%, 50%, 56%, 100% { opacity: 0; }
      51%, 55% { opacity: 1; }
    }
    @keyframes packet-output {
      0%, 56% { transform: translateY(0); opacity: 0; }
      57% { opacity: 1; }
      65% { transform: translateY(36px); opacity: 1; }
      66%, 100% { transform: translateY(36px); opacity: 0; }
    }
    @keyframes output-active {
      0%, 66%, 72%, 100% { opacity: 0; }
      67%, 71% { opacity: 1; }
    }
    @keyframes packet-continuity {
      0%, 73% { transform: translate(0, 0); opacity: 0; }
      74% { transform: translate(0, 0); opacity: 1; }
      77% { transform: translate(-50px, -2px); }
      80% { transform: translate(-76px, -40px); }
      83% { transform: translate(-118px, -62px); }
      86% { transform: translate(-168px, -62px); }
      89% { transform: translate(-218px, -62px); }
      91% { transform: translate(-241px, -74px); }
      92%, 100% { transform: translate(-241px, -74px); opacity: 0; }
    }
    @keyframes context-return {
      0%, 91%, 97%, 100% { opacity: 0; }
      92%, 96% { opacity: 1; }
    }
  </style>

  <rect x="1" y="1" width="1198" height="318" rx="20" fill="url(#surface)" stroke="#d7dce4"/>
  <path d="M792 1H1199V319H1034Z" fill="#e45738" opacity="0.028"/>

  <text x="42" y="45" class="mono" fill="#e45738" font-size="14" letter-spacing="1.8">YI盘 / CONTINUITY LOOP</text>
  <text x="1158" y="45" class="mono" fill="#78818e" font-size="12" letter-spacing="1" text-anchor="end">DATA ON DRIVE / CLOUD ON DEMAND</text>

  <g id="main-loop" fill="none" stroke="#e45738" stroke-width="2" opacity="0.82">
    <path id="context-to-workspace" class="route" d="M314 145H456" marker-end="url(#arrow)"/>
    <path id="workspace-to-output" class="route" d="M600 192V228" marker-end="url(#arrow)"/>
    <path id="continuity-loop" class="route" d="M422 268H390C365 268 348 257 348 240C348 219 330 206 306 206H209C191 206 181 201 181 194" stroke-dashoffset="-12" marker-end="url(#arrow)"/>
  </g>
  <g id="cloud-branch" fill="none" stroke="#e45738" stroke-width="1.6" opacity="0.64">
    <path id="workspace-to-model" class="route" d="M744 126H884" marker-end="url(#arrow)"/>
    <path id="model-to-workspace" class="route" d="M884 163H744" marker-end="url(#arrow)"/>
  </g>

  <g class="mono" fill="#697381" font-size="11" letter-spacing="0.6">
    <text x="385" y="126" text-anchor="middle">检索 / 继续</text>
    <text x="814" y="111" text-anchor="middle">按需请求</text>
    <text x="814" y="187" text-anchor="middle">返回结果</text>
    <text x="620" y="218">生成 / 记录</text>
    <text x="266" y="224" text-anchor="middle">记录 / 沉淀</text>
  </g>

  <g fill="#a92f18" stroke="#ffffff" stroke-width="2">
    <circle id="packet-context" class="packet packet-context" cx="314" cy="145" r="4.5"/>
    <circle id="packet-model-out" class="packet packet-model-out" cx="744" cy="126" r="4.5"/>
    <circle id="packet-model-back" class="packet packet-model-back" cx="884" cy="163" r="4.5"/>
    <circle id="packet-output" class="packet packet-output" cx="600" cy="192" r="4.5"/>
    <circle id="packet-continuity" class="packet packet-continuity" cx="422" cy="268" r="4.5"/>
  </g>

  <g class="node context">
    <rect x="48" y="96" width="266" height="98" rx="16" fill="#ffffff" stroke="#cbd1da"/>
    <text x="74" y="126" class="mono" fill="#697381" font-size="13" letter-spacing="1.2">LOCAL CONTEXT</text>
    <text x="74" y="158" fill="#18202a" font-size="24" font-weight="700">盘内资料与任务</text>
    <text x="74" y="181" fill="#697381" font-size="14">长期资料 · 最近任务</text>
    <rect id="activity-context-return" class="activity activity-context-return" x="43" y="91" width="276" height="108" rx="20" fill="none" stroke="#e45738" stroke-width="3"/>
  </g>

  <g class="workspace">
    <rect x="456" y="82" width="288" height="110" rx="16" fill="#fff8f6" stroke="#e45738" stroke-width="2"/>
    <rect x="470" y="96" width="52" height="82" rx="8" fill="#ffffff" stroke="#e45738" stroke-opacity="0.42"/>
    <rect x="482" y="111" width="7" height="50" fill="#e45738" opacity="0.72"/>
    <rect x="494" y="111" width="7" height="50" fill="#e45738" opacity="0.42"/>
    <rect x="506" y="111" width="7" height="50" fill="#e45738" opacity="0.24"/>
    <text x="550" y="123" class="mono" fill="#e45738" font-size="13" letter-spacing="1.2">AGENT WORKSPACE</text>
    <text x="550" y="158" fill="#18202a" font-size="27" font-weight="800">Yi盘工作台</text>
    <text x="550" y="181" fill="#697381" font-size="14">检索资料，处理当前任务</text>
    <rect id="activity-workspace-in" class="activity activity-workspace-in" x="451" y="77" width="298" height="120" rx="20" fill="none" stroke="#e45738" stroke-width="3"/>
    <rect id="activity-workspace-back" class="activity activity-workspace-back" x="451" y="77" width="298" height="120" rx="20" fill="none" stroke="#e45738" stroke-width="3"/>
  </g>

  <g class="node model">
    <rect x="884" y="96" width="268" height="98" rx="16" fill="#ffffff" stroke="#cbd1da"/>
    <text x="910" y="126" class="mono" fill="#697381" font-size="13" letter-spacing="1.2">CLOUD MODELS</text>
    <text x="910" y="158" fill="#18202a" font-size="24" font-weight="700">云端模型</text>
    <text x="910" y="181" fill="#697381" font-size="14">需要智能处理时按需调用</text>
    <rect id="activity-model" class="activity activity-model" x="879" y="91" width="278" height="108" rx="20" fill="none" stroke="#e45738" stroke-width="3"/>
  </g>

  <g class="node output">
    <rect x="422" y="228" width="356" height="80" rx="16" fill="#ffffff" stroke="#cbd1da"/>
    <text x="446" y="251" class="mono" fill="#697381" font-size="12" letter-spacing="1">LOCAL CONTINUITY</text>
    <text x="446" y="275" fill="#18202a" font-size="24" font-weight="700">产出与任务记录留在盘内</text>
    <text x="446" y="298" fill="#697381" font-size="14">数据随盘走</text>
    <rect id="activity-output" class="activity activity-output" x="417" y="223" width="366" height="90" rx="20" fill="none" stroke="#e45738" stroke-width="3"/>
  </g>
</svg>
